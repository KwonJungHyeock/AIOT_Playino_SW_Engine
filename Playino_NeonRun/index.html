<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>EDDIE NEON RUN — 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#04050c}
  canvas{display:block}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:4;
            box-shadow:inset 0 0 220px 40px rgba(0,0,0,.7)}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
       padding:18px 24px;color:#dff;z-index:5;pointer-events:none;text-shadow:0 2px 10px #000}
  #hud .score{font-size:34px;font-weight:800;letter-spacing:1px}
  #hud .sub{font-size:12px;color:#7fd4ff;letter-spacing:2px}
  #hud .right{text-align:right}

  /* 화면 조작 버튼 */
  #pad{position:fixed;inset:auto 0 0 0;z-index:6;display:flex;justify-content:center;gap:14px;padding:0 18px 22px;
       pointer-events:none}
  #pad.hide{display:none}
  .pbtn{pointer-events:auto;width:84px;height:84px;border-radius:22px;border:1px solid rgba(120,180,255,.35);
        background:rgba(18,28,54,.55);backdrop-filter:blur(6px);color:#cfe8ff;font-size:30px;font-weight:800;
        display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;
        box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .pbtn:active{background:rgba(80,150,255,.5);transform:scale(.94)}
  .pbtn.wide{flex:1;max-width:150px}

  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
           z-index:10;color:#eaffff;background:radial-gradient(circle at 50% 38%,rgba(24,36,78,.72),rgba(2,3,9,.95));
           text-align:center;gap:14px;padding:20px}
  .overlay.hide{display:none}
  .title{font-size:52px;font-weight:900;letter-spacing:4px;
         background:linear-gradient(90deg,#4fd1ff,#a96bff,#ff6bd0);-webkit-background-clip:text;background-clip:text;color:transparent;
         filter:drop-shadow(0 0 22px rgba(120,180,255,.55))}
  .tagline{color:#9fc7ff;font-size:15px;max-width:460px;line-height:1.6}
  .keys{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .key{background:#121a30;border:1px solid #2c3c66;border-radius:8px;padding:8px 12px;font-size:13px;color:#bcdcff}
  .key b{color:#fff}
  .btn{margin-top:12px;background:linear-gradient(90deg,#4fd1ff,#8a7bff);color:#04121f;border:none;
       padding:15px 40px;border-radius:32px;font-size:19px;font-weight:800;cursor:pointer;
       box-shadow:0 8px 28px rgba(80,150,255,.5)}
  .btn:hover{filter:brightness(1.1)}
  .big{font-size:62px;font-weight:900;color:#ff6b8a;filter:drop-shadow(0 0 16px rgba(255,80,120,.55))}
  .final{font-size:22px}
  #flash{position:fixed;inset:0;background:#ff2b4e;opacity:0;z-index:8;pointer-events:none;transition:opacity .1s}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;color:#7fd4ff;background:#04050c}
</style>
</head>
<body>
  <div id="loading">로딩 중…</div>
  <div id="vignette"></div>
  <div id="hud">
    <div><div class="score" id="score">0</div><div class="sub">DISTANCE</div></div>
    <div class="right"><div class="score" id="coins" style="color:#ffd95a">0</div><div class="sub">COINS</div></div>
  </div>
  <div id="flash"></div>

  <div id="pad" class="hide">
    <div class="pbtn" id="bLeft">◀</div>
    <div class="pbtn wide" id="bSlide">▼</div>
    <div class="pbtn wide" id="bJump">▲</div>
    <div class="pbtn" id="bRight">▶</div>
  </div>

  <div class="overlay" id="startScreen">
    <div class="title">EDDIE NEON RUN</div>
    <div class="tagline">네온 트랙을 질주하는 EDDIE! 장애물을 피하고 코인을 먹으며 최대한 멀리 달려라.</div>
    <div class="keys">
      <div class="key"><b>← →</b> / <b>A D</b> · 좌우</div>
      <div class="key"><b>↑ / Space</b> · 점프</div>
      <div class="key"><b>↓</b> · 슬라이드</div>
      <div class="key">화면 버튼·스와이프도 OK</div>
    </div>
    <button class="btn" id="startBtn">▶ 시작</button>
    <div class="tagline" style="font-size:12px;color:#5a7bbf">🔴벽=피하기 · 🟠허들=점프 · 🔵가로막=슬라이드</div>
  </div>

  <div class="overlay hide" id="overScreen">
    <div class="big">GAME OVER</div>
    <div class="final" id="finalScore"></div>
    <button class="btn" id="retryBtn">↻ 다시 달리기</button>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const $ = id=>document.getElementById(id);

// ============ 렌더러 / 씬 / 카메라 ============
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04050c);
scene.fog = new THREE.Fog(0x04050c, 26, 70);

const camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 4.6, 8.2);
camera.lookAt(0, 1.3, -6);

// ============ 블룸 후처리 ============
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.75, 0.5, 0.82);
composer.addPass(bloom);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ============ 조명 ============
scene.add(new THREE.AmbientLight(0x4060a0, 0.7));
const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(-6, 14, 8); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
Object.assign(key.shadow.camera,{left:-12,right:12,top:14,bottom:-8,near:1,far:40});
scene.add(key);
const fill = new THREE.PointLight(0xa96bff, 1.2, 60); fill.position.set(0,7,12); scene.add(fill);

// ============ 별 배경 ============
(()=>{
  const g = new THREE.BufferGeometry(); const N=600; const p=new Float32Array(N*3);
  for(let i=0;i<N;i++){ p[i*3]=(Math.random()-0.5)*120; p[i*3+1]=Math.random()*60+5; p[i*3+2]=-Math.random()*200-10; }
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  const m = new THREE.PointsMaterial({color:0x8fb6ff, size:0.5, transparent:true, opacity:.8});
  scene.add(new THREE.Points(g,m));
})();

// ============ 트랙 바닥 (스크롤 네온 그리드) ============
function gridTexture(){
  const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
  x.fillStyle='#060a18'; x.fillRect(0,0,512,512);
  x.shadowColor='#3a6bff'; x.shadowBlur=14;
  x.strokeStyle='#3f6fff'; x.lineWidth=3;
  for(let i=0;i<=512;i+=128){ x.beginPath();x.moveTo(0,i);x.lineTo(512,i);x.stroke(); }
  x.strokeStyle='#2548aa';
  [85,256,427].forEach(px=>{ x.beginPath();x.moveTo(px,0);x.lineTo(px,512);x.stroke(); });
  return new THREE.CanvasTexture(c);
}
const tex = gridTexture();
tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(2,46);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(9,420),
  new THREE.MeshStandardMaterial({ map:tex, color:0x33406b, roughness:.85, metalness:.2, emissive:0x101830, emissiveIntensity:.4 })
);
ground.rotation.x=-Math.PI/2; ground.position.z=-190; ground.receiveShadow=true; scene.add(ground);

const sideMat = new THREE.MeshStandardMaterial({color:0x070c1e, emissive:0x12306a, emissiveIntensity:.7, metalness:.5, roughness:.4});
[-5.2,5.2].forEach(sx=>{ const w=new THREE.Mesh(new THREE.BoxGeometry(.4,3.2,420),sideMat); w.position.set(sx,1.6,-190); scene.add(w); });

const pillars=[];
for(let i=0;i<26;i++){
  const side=i%2===0?-5:5;
  const p=new THREE.Mesh(new THREE.BoxGeometry(.16,1.4,.16),
    new THREE.MeshStandardMaterial({color:0x000,emissive:0x4fd1ff,emissiveIntensity:2.4}));
  p.position.set(side,2.8,-i*8); scene.add(p); pillars.push(p);
}

const LANES=[-2.2,0,2.2];

// ============ EDDIE 캐릭터 ============
const eddie = new THREE.Group();
const shell = new THREE.MeshStandardMaterial({color:0xeef3ff, metalness:.55, roughness:.32});
const accent = new THREE.MeshStandardMaterial({color:0x3fa9ff, metalness:.6, roughness:.3, emissive:0x1f6fd0, emissiveIntensity:.6});
const glow = new THREE.MeshStandardMaterial({color:0x000, emissive:0x5fe0ff, emissiveIntensity:3.0});
const dark = new THREE.MeshStandardMaterial({color:0x10182e, metalness:.7, roughness:.3});

// 몸통 (둥근 캡슐)
const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.46,0.55,8,18), shell);
torso.position.y=1.15; torso.castShadow=true; eddie.add(torso);
// 가슴 코어(빛)
const core = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.08,20), glow);
core.rotation.x=Math.PI/2; core.position.set(0,1.2,0.44); eddie.add(core);
// 머리
const head = new THREE.Mesh(new THREE.SphereGeometry(0.42,24,20), shell);
head.scale.set(1,0.92,0.95); head.position.y=1.95; head.castShadow=true; eddie.add(head);
// 바이저(눈)
const visor = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.2,0.18), dark);
visor.position.set(0,1.97,0.32); eddie.add(visor);
const eye = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.06), glow);
eye.position.set(0,1.97,0.42); eddie.add(eye);
// 안테나
const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.32,8), accent); ant.position.set(0,2.4,0); eddie.add(ant);
const antBall = new THREE.Mesh(new THREE.SphereGeometry(0.08,12,12), glow); antBall.position.set(0,2.6,0); eddie.add(antBall);
// 어깨 패드
[-0.5,0.5].forEach(x=>{ const s=new THREE.Mesh(new THREE.SphereGeometry(0.2,16,12),accent); s.position.set(x,1.45,0); s.castShadow=true; eddie.add(s); });
// 팔 (피벗 그룹으로 스윙)
function makeLimb(x,y,len,r,mat){
  const pivot=new THREE.Group(); pivot.position.set(x,y,0);
  const seg=new THREE.Mesh(new THREE.CapsuleGeometry(r,len,6,12),mat);
  seg.position.y=-len/2-r; seg.castShadow=true; pivot.add(seg);
  eddie.add(pivot); return pivot;
}
const armL=makeLimb(-0.52,1.45,0.34,0.12,shell);
const armR=makeLimb( 0.52,1.45,0.34,0.12,shell);
const legL=makeLimb(-0.22,0.72,0.4,0.15,accent);
const legR=makeLimb( 0.22,0.72,0.4,0.15,accent);
// 제트 트레일(엉덩이 뒤 빛)
const thruster=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.5,12), glow);
thruster.rotation.x=-Math.PI/2; thruster.position.set(0,0.95,-0.45); eddie.add(thruster);
const thrLight=new THREE.PointLight(0x5fe0ff,1.6,6); thrLight.position.set(0,1,-0.6); eddie.add(thrLight);
scene.add(eddie);

// ============ 장애물/코인 ============
const active=[];
const matWall  = new THREE.MeshStandardMaterial({color:0x1a0008,emissive:0xff2b4e,emissiveIntensity:1.5,metalness:.3,roughness:.4});
const matHurdle= new THREE.MeshStandardMaterial({color:0x1a0e00,emissive:0xff9a2b,emissiveIntensity:1.5});
const matBar   = new THREE.MeshStandardMaterial({color:0x001020,emissive:0x4fa8ff,emissiveIntensity:1.5});
const matCoin  = new THREE.MeshStandardMaterial({color:0x000,emissive:0xffd95a,emissiveIntensity:2.0,metalness:.6,roughness:.2});

function spawnRow(z){
  const lane=Math.floor(Math.random()*3);
  const t=Math.random(); let m;
  if(t<.4){
    m=new THREE.Mesh(new THREE.BoxGeometry(1.6,2.3,.7), matWall);
    m.position.set(LANES[lane],1.15,z); m.userData.type='wall';
  } else if(t<.7){
    m=new THREE.Mesh(new THREE.BoxGeometry(1.6,.7,.7), matHurdle);
    m.position.set(LANES[lane],.35,z); m.userData.type='hurdle';
  } else {
    m=new THREE.Mesh(new THREE.BoxGeometry(1.9,.45,.7), matBar);
    m.position.set(LANES[lane],1.95,z); m.userData.type='bar';
    [-.9,.9].forEach(px=>{const p=new THREE.Mesh(new THREE.BoxGeometry(.12,2,.12),matBar);p.position.set(px,-0.97,0);m.add(p);});
  }
  m.castShadow=true; m.userData.lane=lane; m.userData.checked=false;
  scene.add(m); active.push(m);
  // 코인 줄
  let cl; do{cl=Math.floor(Math.random()*3);}while(cl===lane&&Math.random()<.6);
  for(let i=0;i<4;i++){
    const coin=new THREE.Mesh(new THREE.TorusGeometry(.32,.12,10,20),matCoin);
    coin.rotation.x=Math.PI/2; coin.position.set(LANES[cl],1.1,z-i*2.0);
    coin.userData.type='coin'; coin.userData.lane=cl; coin.userData.checked=false;
    scene.add(coin); active.push(coin);
  }
}

// ============ 코인 획득 파티클 ============
const fx=[];
function burst(pos){
  for(let i=0;i<8;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8),matCoin.clone());
    s.position.copy(pos);
    s.userData.v=new THREE.Vector3((Math.random()-.5)*5,Math.random()*5+1,(Math.random()-.5)*5);
    s.userData.life=0.5; scene.add(s); fx.push(s);
  }
}

// ============ 게임 상태/입력 ============
let game;
const G=36, JUMP_V=12;
function reset(){
  game={running:false,speed:11,dist:0,coins:0,lane:1,y:0,vy:0,slideT:0,sinceSpawn:0,t:0};
}
reset();

function setLane(d){ if(game.running) game.lane=Math.max(0,Math.min(2,game.lane+d)); }
function jump(){ if(game.running && game.y<=0.05 && game.slideT<=0) game.vy=JUMP_V; }
function slide(){ if(game.running && game.y<=0.05 && game.slideT<=0) game.slideT=0.6; }

addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')setLane(-1);
  else if(e.code==='ArrowRight'||e.code==='KeyD')setLane(1);
  else if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'){e.preventDefault();jump();}
  else if(e.code==='ArrowDown'||e.code==='KeyS')slide();
});
// 화면 버튼
const tap=(id,fn)=>{const el=$(id); el.addEventListener('click',fn); el.addEventListener('touchstart',e=>{e.preventDefault();fn();},{passive:false});};
tap('bLeft',()=>setLane(-1)); tap('bRight',()=>setLane(1)); tap('bJump',jump); tap('bSlide',slide);
// 스와이프
let sx=0,sy=0;
addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
addEventListener('touchend',e=>{
  if(!game.running)return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<24&&Math.abs(dy)<24)return;
  if(Math.abs(dx)>Math.abs(dy))setLane(dx>0?1:-1); else dy<0?jump():slide();
});

function startGame(){
  active.forEach(o=>scene.remove(o)); active.length=0;
  fx.forEach(o=>scene.remove(o)); fx.length=0;
  reset(); game.running=true;
  $('score').textContent=0; $('coins').textContent=0;
  $('startScreen').classList.add('hide'); $('overScreen').classList.add('hide'); $('pad').classList.remove('hide');
  for(let z=-26; z>-80; z-=10) spawnRow(z);
  clock.getDelta();
}
function gameOver(){
  game.running=false;
  $('finalScore').innerHTML=`거리 <b>${Math.floor(game.dist)}m</b> · 코인 <b style="color:#ffd95a">${game.coins}</b>`;
  $('overScreen').classList.remove('hide'); $('pad').classList.add('hide');
  const f=$('flash'); f.style.opacity=.6; setTimeout(()=>f.style.opacity=0,100);
}
$('startBtn').onclick=startGame; $('retryBtn').onclick=startGame;

// ============ 루프 ============
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const sp = game.running?game.speed:5;

  tex.offset.y -= sp*dt*0.05;
  pillars.forEach(p=>{ p.position.z+=sp*dt; if(p.position.z>10)p.position.z-=26*8; });
  antBall.material.emissiveIntensity = 2.5+Math.sin(performance.now()*0.005)*1;

  if(game.running){
    game.t+=dt;
    game.speed=Math.min(28, game.speed+dt*0.32);   // 완만한 가속(쉬움)
    game.dist+=game.speed*dt;
    $('score').textContent=Math.floor(game.dist);

    // 부드럽고 빠른 차선 보간
    const tx=LANES[game.lane];
    eddie.position.x += (tx-eddie.position.x)*Math.min(1,dt*16);
    eddie.rotation.y = (tx-eddie.position.x)*0.4;
    eddie.rotation.z = (tx-eddie.position.x)*-0.18;

    // 점프
    game.vy-=G*dt; game.y+=game.vy*dt; if(game.y<0){game.y=0;game.vy=0;}
    if(game.slideT>0) game.slideT-=dt;
    const sliding=game.slideT>0;
    eddie.position.y=game.y;
    // 슬라이드: 앞으로 숙임
    const leanT = sliding?1:0;
    eddie.rotation.x += ((leanT*-1.15)-eddie.rotation.x)*Math.min(1,dt*16);

    // 달리기 모션
    const run=game.t*16, amp=game.y>0?0.25:1;
    legL.rotation.x=Math.sin(run)*0.8*amp; legR.rotation.x=-Math.sin(run)*0.8*amp;
    armL.rotation.x=-Math.sin(run)*0.6*amp; armR.rotation.x=Math.sin(run)*0.6*amp;
    thruster.scale.y=1+Math.sin(run*2)*0.3; thrLight.intensity=1.4+Math.sin(run*2)*0.6;

    // 스폰
    game.sinceSpawn+=game.speed*dt;
    if(game.sinceSpawn>10){game.sinceSpawn=0;spawnRow(-82);}

    // 이동 + 충돌
    for(let i=active.length-1;i>=0;i--){
      const o=active[i]; o.position.z+=game.speed*dt;
      if(o.userData.type==='coin') o.rotation.z+=dt*5;
      if(!o.userData.checked && o.position.z>-0.8){
        o.userData.checked=true;
        if(o.userData.lane===game.lane){
          const ty=o.userData.type;
          if(ty==='coin'){ game.coins++; $('coins').textContent=game.coins; burst(o.position); scene.remove(o); active.splice(i,1); continue; }
          else if(ty==='wall'){ return gameOver(); }
          else if(ty==='hurdle'){ if(game.y<0.5) return gameOver(); }
          else if(ty==='bar'){ if(!sliding) return gameOver(); }
        }
      }
      if(o.position.z>9){ scene.remove(o); active.splice(i,1); }
    }
  } else {
    // 대기 화면에서도 살짝 둥둥
    eddie.position.y=Math.sin(performance.now()*0.002)*0.08;
  }

  // 파티클
  for(let i=fx.length-1;i>=0;i--){
    const s=fx[i]; s.userData.life-=dt;
    s.position.addScaledVector(s.userData.v,dt); s.userData.v.y-=14*dt;
    s.scale.multiplyScalar(1-dt*3);
    if(s.userData.life<=0){ scene.remove(s); fx.splice(i,1); }
  }

  // 카메라 follow
  camera.position.x += (eddie.position.x*0.4-camera.position.x)*Math.min(1,dt*5);
  camera.lookAt(eddie.position.x*0.35,1.3,-6);

  composer.render();
}

$('loading').style.display='none';
animate();
</script>
</body>
</html>
